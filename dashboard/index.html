<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bubbaloop Dashboard</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' ws: wss:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; script-src 'self' 'wasm-unsafe-eval'">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <div id="loading-fallback" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0f;color:#9090a0;font-family:sans-serif;flex-direction:column;gap:12px">
        <div style="width:32px;height:32px;border:3px solid #2a2a3a;border-top-color:#3d5afe;border-radius:50%;animation:s 1s linear infinite"></div>
        <div>Loading Bubbaloop...</div>
        <style>@keyframes s{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Catch fatal module loading errors (WASM, browser compat)
      function showErrorFallback(title, message, hint) {
        var f = document.getElementById('loading-fallback');
        if (!f) return;
        f.textContent = '';
        var wrapper = document.createElement('div');
        wrapper.style.cssText = 'text-align:center;padding:20px';
        var h = document.createElement('div');
        h.style.cssText = 'font-size:24px;margin-bottom:12px;color:#ff1744';
        h.textContent = title;
        var msg = document.createElement('div');
        msg.style.cssText = 'color:#9090a0;font-size:14px;max-width:400px';
        msg.textContent = message;
        var foot = document.createElement('div');
        foot.style.cssText = 'margin-top:16px;color:#606070;font-size:12px';
        foot.textContent = hint;
        wrapper.appendChild(h);
        wrapper.appendChild(msg);
        wrapper.appendChild(foot);
        f.appendChild(wrapper);
      }
      window.addEventListener('error', function(e) {
        showErrorFallback('Failed to load', e.message || 'Unknown error', 'Try Chrome or Safari 15+ on desktop');
      });
      window.addEventListener('unhandledrejection', function(e) {
        showErrorFallback('Connection Error', e.reason?.message || String(e.reason || 'Module failed to load'), 'Check console for details (F12)');
      });
    </script>
  </body>
</html>
