site_name: Bubbaloop
site_description: The open-source Hardware AI agent. Cameras, sensors, robots, and IoT fleets — orchestrated by AI.
site_author: Edgar Riba

repo_name: kornia/bubbaloop
repo_url: https://github.com/kornia/bubbaloop

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  features:
    - announce.dismiss
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

nav:
  - Home: index.md
  - Getting Started:
    - Quickstart: getting-started/quickstart.md
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md
  - Concepts:
    - Architecture: concepts/architecture.md
    - Messaging: concepts/messaging.md
    - 3-Tier Memory: concepts/memory.md
    - Topics: concepts/topics.md
  - Agent:
    - Agent Guide: agent-guide.md
    - Guides:
      - Telemetry Watchdog: guides/telemetry-watchdog.md
  - Nodes:
    - Overview: components/index.md
    - Sensors:
      - Overview: components/sensors/index.md
      - RTSP Camera: components/sensors/rtsp-camera.md
    - Services:
      - Overview: components/services/index.md
      - OpenMeteo Weather: components/services/openmeteo.md
    - Actuators:
      - Overview: components/actuators/index.md
    - Create Your First Node: guides/create-your-first-node.md
  - Dashboard:
    - Overview: dashboard/index.md
    - Panels:
      - Camera: dashboard/panels/camera.md
      - Raw Data: dashboard/panels/raw-data.md
      - Weather: dashboard/panels/weather.md
      - Stats & Metrics: dashboard/panels/stats.md
    - Remote Access: dashboard/remote-access.md
  - Reference:
    - CLI Commands: reference/cli.md
    - API:
      - Overview: api/index.md
      - Header: api/header.md
      - Camera Messages: api/camera.md
      - Weather Messages: api/weather.md
    - Troubleshooting: troubleshooting.md

extra:
  announce: "New: Multi-agent runtime with Soul, 3-tier memory, and telemetry watchdog"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kornia/bubbaloop
    - icon: fontawesome/brands/discord
      link: https://discord.com/invite/HfnywwpBnD
