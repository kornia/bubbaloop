{% extends "base.html" %}

{% block extrahead %}
  {% if page %}
  {# OpenGraph #}
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{ page.meta.title or page.title }} - {{ config.site_name }}" />
  <meta property="og:description" content="{{ page.meta.description or config.site_description }}" />
  <meta property="og:url" content="{{ page.canonical_url }}" />
  <meta property="og:site_name" content="{{ config.site_name }}" />
  {# Twitter Card #}
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="{{ page.meta.title or page.title }} - {{ config.site_name }}" />
  <meta name="twitter:description" content="{{ page.meta.description or config.site_description }}" />
  {# Structured Data #}
  {% if page.is_homepage %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Bubbaloop",
    "description": "{{ config.site_description }}",
    "url": "{{ config.site_url }}",
    "applicationCategory": "DeveloperApplication",
    "operatingSystem": "Linux",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "author": {
      "@type": "Organization",
      "name": "Kornia",
      "url": "https://github.com/kornia"
    },
    "codeRepository": "https://github.com/kornia/bubbaloop",
    "license": "https://opensource.org/licenses/Apache-2.0",
    "programmingLanguage": ["Rust", "Python", "TypeScript"]
  }
  </script>
  {% else %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "TechArticle",
    "headline": "{{ page.meta.title or page.title }} - {{ config.site_name }}",
    "description": "{{ page.meta.description or config.site_description }}",
    "url": "{{ page.canonical_url }}",
    "author": {
      "@type": "Organization",
      "name": "Kornia",
      "url": "https://github.com/kornia"
    },
    "publisher": {
      "@type": "Organization",
      "name": "Kornia"
    }
  }
  </script>
  {% endif %}
  {% endif %}
{% endblock %}
