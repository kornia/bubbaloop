services:
  # Main development container — your code lives here
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - cargo-cache:/root/.cargo/registry
      - cargo-git:/root/.cargo/git
      - target-cache:/workspace/target
      - pixi-cache:/root/.pixi
      - ${HOME}/.ssh:/root/.ssh:ro
    environment:
      - RUST_LOG=info
      - BUBBALOOP_ZENOH_ENDPOINT=tcp/zenoh:7447
      - CARGO_BUILD_JOBS=1
      - CARGO_PROFILE_RELEASE_LTO=off

    depends_on:
      - zenoh
    command: sleep infinity

  # Zenoh router — internal only, not exposed to Mac host
  # Dev container connects via Docker network: tcp/zenoh:7447
  zenoh:
    image: eclipse/zenoh:1.1.0
    restart: unless-stopped

volumes:
  cargo-cache:
  cargo-git:
  target-cache:
  pixi-cache:
